<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .wheel-container {
            position: relative;
            width: 360px;
            height: 360px;
            margin: 0 auto;
        }

        /* Mũi tên chỉ hướng kết quả */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 28px solid #ff4757;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 6px solid #fff;
            background: #fff;
        }

        .spin-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #2ed573 0%, #26af5f 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 213, 115, 0.4);
            transition: all 0.3s ease;
            width: 80%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .spin-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(46, 213, 115, 0.6);
        }

        .spin-btn:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .spin-btn:disabled {
            background: #718093;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* Hộp thoại thông báo kết quả */
        .result-container {
            margin-top: 25px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result {
            font-size: 22px;
            font-weight: bold;
            color: #ff4757;
            background: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: inline-block;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .notice {
            font-size: 13px;
            color: #f5cd79;
            margin-top: 15px;
            font-style: italic;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Vòng Quay May Mắn</h1>
        <p class="subtitle">Chúc mừng 2 con nhợn !</p>
        
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel" width="400" height="400"></canvas>
        </div>

        <button class="spin-btn" id="spinBtn">QUAY NGAY</button>
        
        <div class="result-container" id="resultContainer"></div>
        
    </div>

    <script>
        // CÀI ĐẶT TỶ LỆ TRÚNG THƯỞNG TẠI ĐÂY
        // Bạn có thể chỉnh sửa 'weight' (Trọng số/Tỷ lệ %). Nên để tổng bằng 100 cho dễ quản lý.
        const giftsData = [
            	{ name: "Quảng hàn tiên cung", weight: 6 },      
            	{ name: "Tai nghe R60i", weight: 6 },        
            	{ name: "Phấn trang điểm", weight: 6 },        
            	{ name: "Sách đam mỹ-gay", weight: 0 },
	{ name: "Biệt thự Vinhome", weight: 0 },
            	{ name: "Thêm 1 lượt quay", weight: 22 },     
            	{ name: "Một cái ôm ấm áp", weight: 6 },   
            	{ name: "Sạc dự phòng", weight: 6 },          
            	{ name: "Quạt cầm tay", weight: 6 },
	{ name: "Chuột laptop", weight: 6 },
	{ name: "Xe Rolls-Royce ", weight: 0 },
	{ name: "Loa JBL go 4 ", weight: 6 },
	{ name: "Soundcore Select 4 ", weight: 6 },
	{ name: "Xiaomi band 10 ", weight: 6 },
	{ name: "Biore gel chống nắng ", weight: 6 },
	{ name: "Son Môi", weight: 6 },
	{ name: "Váy", weight: 6 }
	
   
        ];
        
        // Tự động lấy danh sách tên quà để vẽ lên Canvas
        const gifts = giftsData.map(item => item.name);
        
        // Mảng màu sắc tương ứng cho từng ô (màu sắc tươi sáng xen kẽ nhau)
        const colors = ["#ff4757", "#2ed573", "#1e90ff", "#ffa502", "#9b59b6", "#ff6b81"];

        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const resultContainer = document.getElementById("resultContainer");

        const size = canvas.width;
        const center = size / 2;
        const totalSegments = gifts.length;
        const arc = Math.PI * 2 / totalSegments;

        let isSpinning = false;
        let currentRotation = 0; // Lưu trữ góc quay tích lũy để không bị giật hình khi quay tiếp

        // Hàm vẽ vòng quay bằng Canvas
        function drawWheel() {
            ctx.clearRect(0, 0, size, size);
            // Để ô đầu tiên nằm chính giữa góc trên hoặc cân đối, Canvas mặc định 0 rad là hướng 3 giờ.
            // Ta dịch một chút để căn chỉnh chữ cho đẹp mắt.
            for (let i = 0; i < totalSegments; i++) {
                const angle = i * arc;
                
                // Vẽ các ô màu hình quạt
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath();
                ctx.moveTo(center, center);
                ctx.arc(center, center, center - 6, angle, angle + arc);
                ctx.lineTo(center, center);
                ctx.fill();

                // Viết chữ lên từng ô
                ctx.save();
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 13px 'Segoe UI', sans-serif";
                ctx.textAlign = "right";
                ctx.translate(center, center);
                ctx.rotate(angle + arc / 2);
                
                // Cắt bớt chữ nếu quá dài để tránh tràn viền
                let text = gifts[i];
                if(text.length > 18) text = text.substring(0, 16) + "...";
                
                ctx.fillText(text, center - 25, 5);
                ctx.restore();
            }
        }

        // Thuật toán chọn phần thưởng ngẫu nhiên dựa trên tỷ lệ (weight)
        function getPrizeBasedOnWeight() {
            const totalWeight = giftsData.reduce((sum, item) => sum + item.weight, 0);
            let random = Math.random() * totalWeight;
            
            for (let i = 0; i < giftsData.length; i++) {
                random -= giftsData[i].weight;
                if (random <= 0) {
                    return i; // Trả về chỉ số (index) của món quà trúng
                }
            }
            return 0;
        }

        // Xử lý logic khi bấm nút Quay
        function spin() {
            if (isSpinning) return;

            isSpinning = true;
            spinBtn.disabled = true;
            resultContainer.innerHTML = "<span style='color: #f5cd79; font-weight: bold;'>Vòng quay đang quay...</span>";

            // 1. Chọn quà theo tỷ lệ cài đặt trước
            const prizeIndex = getPrizeBasedOnWeight();
            
            // 2. Tính toán góc quay để mũi tên (ở vị trí 12 giờ tức là 270 độ) chỉ đúng vào ô trúng
            // Trong Canvas, ô i bắt đầu từ góc (i * góc_mỗi_ô) đến ((i+1) * góc_mỗi_ô) tính từ vị trí 3 giờ xuôi chiều kim đồng hồ.
            const segmentDegrees = 360 / totalSegments;
            
            // Tính góc tâm của ô trúng giải (tính theo độ)
            const prizeCenterDegrees = (prizeIndex * segmentDegrees) + (segmentDegrees / 2);
            
            // Góc cần quay để ô trúng giải lọt vào vị trí mũi tên (270 độ)
            const targetDegrees = (360 - prizeCenterDegrees + 270) % 360;
            
            // Cộng thêm tối thiểu 5 vòng (1800 độ) để tạo hiệu ứng quay vòng mượt mà và đẹp mắt
            const extraDegrees = 1800; 
            
            // Tính toán góc quay đích dựa trên góc hiện tại (để không bị đảo ngược vòng quay)
            const currentModulo = currentRotation % 360;
            currentRotation += extraDegrees + (targetDegrees - currentModulo + (targetDegrees < currentModulo ? 360 : 0));

            // Sử dụng CSS transition để thực hiện chuyển động xoay tròn mượt mà
            canvas.style.transition = "transform 5s cubic-bezier(0.1, 0.8, 0.1, 1)";
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // Chờ hiệu ứng quay kết thúc (5 giây, khớp với CSS transition)
            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false; // Mở lại nút quay cho lần tiếp theo
                
                const finalGift = gifts[prizeIndex];

                // Hiển thị kết quả trúng thưởng đẹp mắt
                resultContainer.innerHTML = `<div class="result">🎉 Chúc mừng gái: ${finalGift}</div>`;
            }, 5000);
        }

        // Khởi chạy vòng quay ban đầu khi tải xong trang web
        drawWheel();
        spinBtn.addEventListener("click", spin);
    </script>
</body>
</html>
